<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo">
      WaySee
    </ion-title>
    <ion-buttons slot="end">
      <ion-button [routerLink]="['/home']">
        <img src="assets/icon/logo-waysee-clara.jpg" class="logo">
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div id="container">
    <div class="button-column">
      <ion-button class="round-btn" fill="solid">
        <div class="btn-content">
          <ion-icon src="assets/icon/home-semaforo.svg"></ion-icon>
          <span>Verificar semáforo</span>
        </div>
      </ion-button>
  
      <ion-button class="round-btn" fill="solid">
        <div class="btn-content">
          <ion-icon src="assets/icon/home-pin.svg"></ion-icon>
          <span>Traçar rota</span>
        </div>
      </ion-button>
  
    </div>
  </div>
</ion-content>
